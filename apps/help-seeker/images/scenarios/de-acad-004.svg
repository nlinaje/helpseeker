<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#fffbeb" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#fde68a"/>

  <!-- Desk -->
  <rect x="60" y="148" width="210" height="11" fill="#92400e" rx="3"/>

  <!-- Tablet on desk (broken / error screen) -->
  <rect x="148" y="72" width="100" height="78" fill="#1f2937" rx="10"/>
  <rect x="153" y="77" width="90"  height="64" fill="#374151" rx="8"/>
  <!-- Error screen: red X and text -->
  <circle cx="198" cy="98" r="22" fill="#dc2626" opacity="0.85"/>
  <line x1="186" y1="86" x2="210" y2="110" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <line x1="210" y1="86" x2="186" y2="110" stroke="white" stroke-width="5" stroke-linecap="round"/>
  <text x="198" y="132" font-size="9" text-anchor="middle" fill="#9ca3af">Fehler</text>
  <!-- Home button -->
  <circle cx="198" cy="145" r="5" fill="#4b5563" stroke="#6b7280" stroke-width="1.5"/>

  <!-- Child looking at tablet, worried -->
  <circle cx="92" cy="100" r="20" fill="#fbbf24"/>
  <path d="M 84 95 Q 87 92 90 95" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 95 95 Q 98 92 101 95" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 85 108 Q 92 104 99 108" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="80" y="120" width="24" height="30" fill="#7c3aed" rx="10"/>

  <!-- Arms: one pointing at tablet -->
  <line x1="104" y1="124" x2="146" y2="112" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="149" cy="111" r="7"  fill="#fbbf24"/>
  <line x1="80"  y1="126" x2="62"  y2="146" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="59" cy="148" r="7"  fill="#fbbf24"/>
</svg>
