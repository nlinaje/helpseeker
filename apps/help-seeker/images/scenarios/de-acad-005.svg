<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#fffbeb" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#fde68a"/>

  <!-- Desk -->
  <rect x="60" y="148" width="210" height="11" fill="#92400e" rx="3"/>
  <rect x="80"  y="159" width="11" height="22" fill="#92400e" rx="2"/>
  <rect x="249" y="159" width="11" height="22" fill="#92400e" rx="2"/>

  <!-- Other students have books (background) -->
  <rect x="210" y="110" width="50" height="36" fill="#6d28d9" rx="3"/>
  <rect x="212" y="112" width="46" height="32" fill="#7c3aed" rx="2"/>
  <text x="235" y="132" font-size="10" text-anchor="middle" fill="#ddd6fe">BUCH</text>

  <!-- Empty desk in front (child has no book) -->
  <rect x="138" y="112" width="62" height="38" fill="#f9fafb" rx="4" stroke="#e5e7eb" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="169" y="136" font-size="22" text-anchor="middle" fill="#d1d5db">?</text>

  <!-- Home thought bubble (book at home) -->
  <circle cx="240" cy="60" r="4"  fill="#fbbf24" opacity="0.6"/>
  <circle cx="252" cy="50" r="7"  fill="#fbbf24" opacity="0.6"/>
  <circle cx="268" cy="42" r="12" fill="#fef9c3" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="268" y="47" font-size="14" text-anchor="middle">🏠</text>

  <!-- Child looking at empty spot, embarrassed -->
  <circle cx="86" cy="98" r="20" fill="#fbbf24"/>
  <!-- Eyes looking sideways / down -->
  <circle cx="79" cy="95" r="3"  fill="#374151"/>
  <circle cx="93" cy="95" r="3"  fill="#374151"/>
  <path d="M 80 107 Q 86 103 92 107" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Blush / embarrassment -->
  <circle cx="76" cy="103" r="5" fill="#fca5a5" opacity="0.6"/>
  <circle cx="96" cy="103" r="5" fill="#fca5a5" opacity="0.6"/>

  <!-- Body -->
  <rect x="74" y="118" width="24" height="32" fill="#d97706" rx="10"/>

  <!-- Arms on empty desk -->
  <line x1="74"  y1="128" x2="56"  y2="148" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="53" cy="150" r="7"  fill="#fbbf24"/>
  <line x1="98"  y1="128" x2="136" y2="140" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="139" cy="141" r="7" fill="#fbbf24"/>
</svg>
