<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#fffbeb" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#fde68a"/>

  <!-- Blackboard with hard multiplication -->
  <rect x="20" y="14" width="160" height="100" fill="#1f2937" rx="5"/>
  <rect x="26" y="20" width="148" height="88" fill="#374151" rx="3"/>
  <!-- Chalk calculation (hard) -->
  <text x="100" y="55"  font-size="20" text-anchor="middle" fill="white" font-family="monospace" font-weight="bold">347 × 28</text>
  <line x1="36" y1="65" x2="164" y2="65" stroke="#9ca3af" stroke-width="1.5"/>
  <text x="100" y="85"  font-size="18" text-anchor="middle" fill="#fca5a5" font-family="monospace" font-weight="bold">= ???</text>
  <!-- Chalk tray -->
  <rect x="20" y="114" width="160" height="6" fill="#374151"/>
  <rect x="36" y="115" width="12" height="4" fill="#f9fafb" rx="1"/>

  <!-- Floating question marks -->
  <text x="200" y="45"  font-size="28" fill="#d97706" opacity="0.7" font-weight="bold">?</text>
  <text x="232" y="80"  font-size="20" fill="#d97706" opacity="0.5" font-weight="bold">?</text>

  <!-- Child staring at board, confused -->
  <circle cx="240" cy="120" r="20" fill="#fbbf24"/>
  <path d="M 232 115 Q 235 112 238 115" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 243 115 Q 246 112 249 115" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 233 128 Q 240 124 247 128" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Raised eyebrows -->
  <path d="M 230 109 Q 234 106 238 109" stroke="#374151" stroke-width="1.5" fill="none"/>
  <path d="M 242 109 Q 246 106 250 109" stroke="#374151" stroke-width="1.5" fill="none"/>

  <!-- Body -->
  <rect x="228" y="140" width="24" height="40" fill="#059669" rx="10"/>
  <!-- Arms -->
  <line x1="228" y1="150" x2="210" y2="162" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="207" cy="164" r="7" fill="#fbbf24"/>
  <line x1="252" y1="148" x2="270" y2="160" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="273" cy="162" r="7" fill="#fbbf24"/>
  <!-- Legs -->
  <line x1="234" y1="180" x2="226" y2="183" stroke="#065f46" stroke-width="9" stroke-linecap="round"/>
  <line x1="248" y1="180" x2="256" y2="183" stroke="#065f46" stroke-width="9" stroke-linecap="round"/>
</svg>
