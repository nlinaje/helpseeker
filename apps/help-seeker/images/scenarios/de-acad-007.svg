<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#fffbeb" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#fde68a"/>

  <!-- Desk -->
  <rect x="60" y="148" width="210" height="11" fill="#92400e" rx="3"/>

  <!-- Open book on desk -->
  <!-- Left page -->
  <path d="M 100 90 Q 100 85 170 88 L 170 148 Q 100 148 100 148 Z" fill="white" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- Right page -->
  <path d="M 170 88 Q 240 85 240 90 L 240 148 Q 170 148 170 148 Z" fill="white" stroke="#d1d5db" stroke-width="1.5"/>
  <!-- Spine -->
  <rect x="168" y="87" width="4" height="61" fill="#92400e" rx="1"/>
  <!-- Lines on left page -->
  <line x1="110" y1="100" x2="165" y2="100" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="110" y1="110" x2="165" y2="110" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="110" y1="120" x2="165" y2="120" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="110" y1="130" x2="165" y2="130" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Difficult word on right page highlighted -->
  <rect x="176" y="100" width="56" height="16" fill="#fef08a" rx="2"/>
  <text x="204" y="112" font-size="9" text-anchor="middle" fill="#92400e" font-weight="bold">Aufmerk-samkeit</text>
  <!-- More lines -->
  <line x1="176" y1="124" x2="232" y2="124" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="176" y1="134" x2="232" y2="134" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Question mark over hard word -->
  <text x="242" y="98" font-size="24" fill="#d97706" opacity="0.8" font-weight="bold">?</text>

  <!-- Child looking at book -->
  <circle cx="70" cy="105" r="19" fill="#fbbf24"/>
  <circle cx="64" cy="101" r="3"  fill="#374151"/>
  <circle cx="76" cy="101" r="3"  fill="#374151"/>
  <path d="M 65 113 Q 70 109 75 113" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body (upper, at desk) -->
  <rect x="59" y="124" width="22" height="26" fill="#0891b2" rx="10"/>

  <!-- Arm pointing at word -->
  <line x1="81"  y1="128" x2="174" y2="108" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="177" cy="107" r="7" fill="#fbbf24"/>
  <line x1="59"  y1="130" x2="42"  y2="148" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="39" cy="150" r="7"  fill="#fbbf24"/>
</svg>
