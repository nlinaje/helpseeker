<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#fffbeb" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#fde68a"/>

  <!-- Teacher figure (left side, hand extended) -->
  <!-- Teacher head -->
  <circle cx="72" cy="78" r="18" fill="#d4a576"/>
  <circle cx="66" cy="74" r="2.5" fill="#374151"/>
  <circle cx="78" cy="74" r="2.5" fill="#374151"/>
  <path d="M 67 85 Q 72 88 77 85" stroke="#374151" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <!-- Teacher hair -->
  <ellipse cx="72" cy="65" rx="18" ry="8" fill="#92400e"/>
  <!-- Teacher body -->
  <rect x="60" y="96" width="24" height="55" fill="#1f2937" rx="8"/>
  <!-- Teacher arm extended (expecting homework) -->
  <line x1="84" y1="104" x2="136" y2="120" stroke="#d4a576" stroke-width="8" stroke-linecap="round"/>
  <circle cx="139" cy="121" r="8" fill="#d4a576"/>
  <!-- Teacher legs -->
  <line x1="66" y1="151" x2="60" y2="183" stroke="#111827" stroke-width="8" stroke-linecap="round"/>
  <line x1="80" y1="151" x2="86" y2="183" stroke="#111827" stroke-width="8" stroke-linecap="round"/>

  <!-- Speech bubble from teacher -->
  <rect x="90"  y="40"  width="104" height="30" fill="white" rx="8" stroke="#e5e7eb" stroke-width="1.5"/>
  <polygon points="104,70 114,70 108,80" fill="white" stroke="#e5e7eb" stroke-width="1" stroke-linejoin="round"/>
  <text x="142" y="60" font-size="10" text-anchor="middle" fill="#374151">Hausaufgaben?</text>

  <!-- Child — embarrassed, empty hands -->
  <circle cx="220" cy="88" r="21" fill="#fbbf24"/>
  <circle cx="213" cy="84" r="3"  fill="#374151"/>
  <circle cx="227" cy="84" r="3"  fill="#374151"/>
  <path d="M 214 100 Q 220 96 226 100" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <circle cx="210" cy="96" r="6" fill="#fca5a5" opacity="0.6"/>
  <circle cx="230" cy="96" r="6" fill="#fca5a5" opacity="0.6"/>

  <!-- Body -->
  <rect x="208" y="109" width="24" height="52" fill="#d97706" rx="10"/>

  <!-- Arms hanging (empty, no homework) -->
  <line x1="208" y1="120" x2="186" y2="142" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="183" cy="145" r="7" fill="#fbbf24"/>
  <line x1="232" y1="120" x2="250" y2="140" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="253" cy="143" r="7" fill="#fbbf24"/>

  <!-- Legs -->
  <line x1="214" y1="161" x2="206" y2="183" stroke="#92400e" stroke-width="9" stroke-linecap="round"/>
  <line x1="228" y1="161" x2="236" y2="183" stroke="#92400e" stroke-width="9" stroke-linecap="round"/>
</svg>
