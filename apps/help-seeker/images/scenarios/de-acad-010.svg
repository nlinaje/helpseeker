<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#fffbeb" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#fde68a"/>

  <!-- Desk -->
  <rect x="60" y="148" width="210" height="11" fill="#92400e" rx="3"/>

  <!-- Broken pencil on desk (two pieces) -->
  <!-- Piece 1 (upper, with eraser) -->
  <rect x="168" y="110" width="7" height="32" fill="#fbbf24" rx="3" transform="rotate(-20 172 126)"/>
  <rect x="166" y="108" width="11" height="7"  fill="#f9a8d4" rx="2" transform="rotate(-20 172 108)"/>
  <!-- Piece 2 (lower, with tip) -->
  <rect x="195" y="120" width="7" height="28" fill="#fbbf24" rx="3" transform="rotate(20 198 134)"/>
  <polygon points="195,148 202,148 198,160" fill="#374151" transform="rotate(20 198 148)"/>
  <!-- Break point (jagged) -->
  <path d="M 187 126 L 192 132 L 188 138" stroke="#dc2626" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Crack lines -->
  <line x1="189" y1="128" x2="194" y2="124" stroke="#dc2626" stroke-width="1.5" opacity="0.7"/>

  <!-- Writing paper nearby -->
  <rect x="140" y="95" width="60" height="50" fill="white" rx="3" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="148" y1="108" x2="192" y2="108" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="148" y1="118" x2="192" y2="118" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="148" y1="128" x2="192" y2="128" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Child at desk, holding broken piece, dismayed -->
  <circle cx="82" cy="96" r="20" fill="#fbbf24"/>
  <circle cx="75" cy="92" r="3"  fill="#374151"/>
  <circle cx="89" cy="92" r="3"  fill="#374151"/>
  <path d="M 76 106 Q 82 102 88 106" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="70" y="116" width="24" height="34" fill="#7c3aed" rx="10"/>

  <!-- Arm holding broken piece up (showing it) -->
  <line x1="94"  y1="120" x2="140" y2="110" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="143" cy="109" r="7" fill="#fbbf24"/>
  <line x1="70"  y1="124" x2="54"  y2="146" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="51" cy="148" r="7"  fill="#fbbf24"/>

  <!-- Exclamation marks -->
  <text x="118" y="78" font-size="22" fill="#dc2626" opacity="0.7" font-weight="bold">!</text>
</svg>
