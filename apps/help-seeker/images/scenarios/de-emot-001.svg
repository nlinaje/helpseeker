<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (warm, slightly alarming) -->
  <rect width="320" height="200" fill="#fff7ed" rx="12"/>
  <!-- Floor -->
  <rect x="0" y="183" width="320" height="17" fill="#fed7aa"/>

  <!-- Speaker left -->
  <rect x="42" y="78" width="28" height="34" fill="#6d28d9" rx="3"/>
  <polygon points="42,78 26,64 26,126 42,112" fill="#4c1d95"/>
  <line x1="49" y1="86" x2="49" y2="104" stroke="#a78bfa" stroke-width="2.5"/>
  <line x1="57" y1="86" x2="57" y2="104" stroke="#a78bfa" stroke-width="2.5"/>
  <line x1="64" y1="86" x2="64" y2="104" stroke="#a78bfa" stroke-width="2.5"/>

  <!-- Sound waves left -->
  <path d="M 78 95 Q 100 72 78 48"  stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 88 95 Q 118 64 88 34"  stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Speaker right -->
  <rect x="250" y="78" width="28" height="34" fill="#6d28d9" rx="3"/>
  <polygon points="278,78 294,64 294,126 278,112" fill="#4c1d95"/>
  <line x1="257" y1="86" x2="257" y2="104" stroke="#a78bfa" stroke-width="2.5"/>
  <line x1="265" y1="86" x2="265" y2="104" stroke="#a78bfa" stroke-width="2.5"/>
  <line x1="272" y1="86" x2="272" y2="104" stroke="#a78bfa" stroke-width="2.5"/>

  <!-- Sound waves right -->
  <path d="M 242 95 Q 220 72 242 48" stroke="#f59e0b" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M 232 95 Q 202 64 232 34" stroke="#f59e0b" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6"/>

  <!-- Floating music/noise notes -->
  <text x="116" y="36" font-size="22" fill="#d97706" opacity="0.8">♪</text>
  <text x="196" y="28" font-size="18" fill="#f59e0b" opacity="0.7">♫</text>
  <text x="152" y="48" font-size="16" fill="#d97706" opacity="0.6">♪</text>

  <!-- Child — hands pressed on ears, squinting -->
  <!-- Head -->
  <circle cx="160" cy="108" r="24" fill="#fbbf24"/>

  <!-- Squinting eyes (closed / stressed) -->
  <path d="M 149 103 Q 153 99 157 103" stroke="#374151" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 163 103 Q 167 99 171 103" stroke="#374151" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Stress lines above eyebrows -->
  <line x1="150" y1="96" x2="152" y2="91" stroke="#92400e" stroke-width="1.5" opacity="0.7"/>
  <line x1="160" y1="93" x2="160" y2="88" stroke="#92400e" stroke-width="1.5" opacity="0.7"/>
  <line x1="170" y1="96" x2="168" y2="91" stroke="#92400e" stroke-width="1.5" opacity="0.7"/>
  <!-- Tense mouth -->
  <path d="M 152 116 Q 160 112 168 116" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Hands on ears (big circles) -->
  <circle cx="133" cy="108" r="13" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
  <circle cx="187" cy="108" r="13" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
  <!-- Short arms connecting to head -->
  <line x1="137" y1="108" x2="146" y2="108" stroke="#fbbf24" stroke-width="11" stroke-linecap="round"/>
  <line x1="174" y1="108" x2="183" y2="108" stroke="#fbbf24" stroke-width="11" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="148" y="132" width="24" height="38" fill="#7c3aed" rx="10"/>

  <!-- Legs -->
  <line x1="153" y1="170" x2="146" y2="183" stroke="#4c1d95" stroke-width="9" stroke-linecap="round"/>
  <line x1="167" y1="170" x2="174" y2="183" stroke="#4c1d95" stroke-width="9" stroke-linecap="round"/>
</svg>
