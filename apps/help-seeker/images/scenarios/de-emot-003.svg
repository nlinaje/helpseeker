<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#fff1f2" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#fecdd3"/>

  <!-- Steam / anger lines radiating from child -->
  <path d="M 210 80 Q 230 60 250 70" stroke="#ef4444" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 215 68 Q 240 50 258 58" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M 100 80 Q 80 60 60 70" stroke="#ef4444" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.7"/>
  <path d="M 95 68 Q 72 50 55 58" stroke="#ef4444" stroke-width="2.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  <!-- Steam puffs above head -->
  <circle cx="148" cy="55" r="10" fill="#fecdd3" opacity="0.8"/>
  <circle cx="162" cy="44" r="14" fill="#fecdd3" opacity="0.8"/>
  <circle cx="176" cy="55" r="10" fill="#fecdd3" opacity="0.8"/>
  <text x="162" y="52" font-size="18" text-anchor="middle" fill="#ef4444" opacity="0.9">💢</text>

  <!-- Child with angry expression, fists clenched -->
  <circle cx="160" cy="100" r="24" fill="#fbbf24"/>
  <!-- Angry eyebrows (inward slant) -->
  <line x1="148" y1="89" x2="158" y2="93" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <line x1="173" y1="89" x2="163" y2="93" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <!-- Angry narrowed eyes -->
  <line x1="150" y1="97" x2="158" y2="97" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <line x1="162" y1="97" x2="170" y2="97" stroke="#374151" stroke-width="3" stroke-linecap="round"/>
  <!-- Angry mouth (tight line with down corners) -->
  <path d="M 152 112 L 168 112" stroke="#374151" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M 152 112 L 150 116" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <path d="M 168 112 L 170 116" stroke="#374151" stroke-width="2" stroke-linecap="round"/>
  <!-- Red flush on cheeks -->
  <circle cx="148" cy="106" r="8" fill="#fca5a5" opacity="0.5"/>
  <circle cx="172" cy="106" r="8" fill="#fca5a5" opacity="0.5"/>

  <!-- Body tense -->
  <rect x="148" y="124" width="24" height="46" fill="#ef4444" rx="10"/>

  <!-- Fists clenched at sides -->
  <line x1="148" y1="132" x2="124" y2="148" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="120" cy="151" r="10" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
  <line x1="172" y1="132" x2="196" y2="148" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="200" cy="151" r="10" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>

  <!-- Legs -->
  <line x1="154" y1="170" x2="146" y2="183" stroke="#9f1239" stroke-width="9" stroke-linecap="round"/>
  <line x1="168" y1="170" x2="176" y2="183" stroke="#9f1239" stroke-width="9" stroke-linecap="round"/>
</svg>
