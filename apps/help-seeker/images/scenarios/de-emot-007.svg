<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#fff7ed" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#fed7aa"/>

  <!-- Desk -->
  <rect x="60" y="148" width="210" height="11" fill="#92400e" rx="3"/>
  <rect x="80"  y="159" width="11" height="22" fill="#92400e" rx="2"/>
  <rect x="249" y="159" width="11" height="22" fill="#92400e" rx="2"/>

  <!-- Sleep Z's floating up -->
  <text x="196" y="110" font-size="24" fill="#7c3aed" opacity="0.7" font-weight="bold">Z</text>
  <text x="216" y="88"  font-size="20" fill="#7c3aed" opacity="0.5" font-weight="bold">Z</text>
  <text x="232" y="68"  font-size="16" fill="#7c3aed" opacity="0.35" font-weight="bold">Z</text>

  <!-- Child with drooping eyes, head nodding at desk -->
  <!-- Head drooping forward, almost touching desk -->
  <circle cx="130" cy="118" r="22" fill="#fbbf24" transform="rotate(15 130 118)"/>
  <!-- Half-closed sleepy eyes -->
  <path d="M 120 115 Q 124 118 128 115" stroke="#374151" stroke-width="3" fill="none" stroke-linecap="round"/>
  <path d="M 132 115 Q 136 118 140 115" stroke="#374151" stroke-width="3" fill="none" stroke-linecap="round"/>
  <!-- Sleepy droopy eyelids (lines slightly over eyes) -->
  <line x1="119" y1="113" x2="129" y2="113" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <line x1="131" y1="113" x2="141" y2="113" stroke="#fbbf24" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
  <!-- Slight open mouth (yawn) -->
  <ellipse cx="130" cy="126" rx="5" ry="3" fill="#d97706" opacity="0.6"/>

  <!-- Body slumped at desk -->
  <rect x="118" y="134" width="24" height="16" fill="#d97706" rx="10"/>

  <!-- Arms on desk (head resting on arms) -->
  <line x1="118" y1="140" x2="80"  y2="148" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="77" cy="148" r="8"  fill="#fbbf24"/>
  <line x1="142" y1="140" x2="180" y2="148" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="183" cy="148" r="8" fill="#fbbf24"/>

  <!-- Moon and stars in background (sleepy theme) -->
  <text x="258" y="52" font-size="22" fill="#fbbf24" opacity="0.5">🌙</text>
  <text x="38"  y="42" font-size="14" fill="#fbbf24" opacity="0.4">✦</text>
  <text x="58"  y="68" font-size="10" fill="#fbbf24" opacity="0.3">✦</text>
</svg>
