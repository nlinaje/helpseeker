<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="320" height="200" fill="#f5f3ff" rx="12"/>
  <!-- Floor -->
  <rect x="0" y="183" width="320" height="17" fill="#ddd6fe"/>

  <!-- Cabinet (side view) -->
  <!-- Body -->
  <rect x="160" y="72" width="138" height="96" fill="#d97706" rx="4"/>
  <!-- Front panel (slightly darker inset) -->
  <rect x="165" y="77" width="128" height="86" fill="#b45309" rx="3"/>
  <!-- Cabinet top edge -->
  <rect x="158" y="68" width="142" height="9" fill="#92400e" rx="2"/>
  <!-- Door line in middle -->
  <line x1="229" y1="77" x2="229" y2="163" stroke="#92400e" stroke-width="2"/>
  <!-- Door handles -->
  <rect x="216" y="112" width="8" height="16" fill="#fbbf24" rx="3"/>
  <rect x="236" y="112" width="8" height="16" fill="#fbbf24" rx="3"/>
  <!-- Cabinet legs -->
  <rect x="168" y="168" width="12" height="15" fill="#92400e" rx="2"/>
  <rect x="276" y="168" width="12" height="15" fill="#92400e" rx="2"/>

  <!-- Dark gap under cabinet -->
  <rect x="160" y="162" width="138" height="8" fill="#1c1917" rx="1"/>

  <!-- Pen visible under cabinet -->
  <!-- Pen body (yellow, rolling, slightly diagonal) -->
  <rect x="188" y="167" width="72" height="7" fill="#fbbf24" rx="3" transform="rotate(-4 224 170)"/>
  <!-- Pen tip (red, pointing left) -->
  <polygon points="188,167 188,174 180,170" fill="#f87171" transform="rotate(-4 188 170)"/>
  <!-- Pen clip detail -->
  <rect x="243" y="167" width="6" height="7" fill="#d97706" rx="1" transform="rotate(-4 246 170)"/>
  <!-- Pen eraser end -->
  <rect x="258" y="167" width="8" height="7" fill="#f9a8d4" rx="2" transform="rotate(-4 262 170)"/>

  <!-- Dashed arrow indicating rolling direction -->
  <path d="M 174 155 Q 165 162 185 168" stroke="#6d28d9" stroke-width="2" fill="none" stroke-dasharray="4,3" opacity="0.7"/>

  <!-- Child (looking down at floor, concerned) -->
  <!-- Head (slightly tilted forward) -->
  <circle cx="88" cy="96" r="21" fill="#fbbf24"/>
  <!-- Looking-down eyes -->
  <path d="M 80 96 Q 83 99 86 96" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 91 96 Q 94 99 97 96" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Worried mouth -->
  <path d="M 82 106 Q 88 103 94 106" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body (leaning slightly forward) -->
  <rect x="76" y="117" width="24" height="44" fill="#0891b2" rx="10"/>

  <!-- Left arm (hanging) -->
  <line x1="76"  y1="126" x2="56"  y2="144" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="53" cy="147" r="7" fill="#fbbf24"/>

  <!-- Right arm (pointing down at floor toward pen) -->
  <line x1="100" y1="124" x2="143" y2="163" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="146" cy="166" r="7" fill="#fbbf24"/>

  <!-- Legs -->
  <line x1="82"  y1="161" x2="75"  y2="183" stroke="#0e7490" stroke-width="9" stroke-linecap="round"/>
  <line x1="96"  y1="161" x2="103" y2="183" stroke="#0e7490" stroke-width="9" stroke-linecap="round"/>
</svg>
