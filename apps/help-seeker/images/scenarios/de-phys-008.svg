<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#f5f3ff" rx="12"/>
  <!-- Bench / floor -->
  <rect x="40" y="160" width="240" height="14" fill="#92400e" rx="4"/>
  <rect x="60" y="174" width="14" height="20" fill="#92400e" rx="2"/>
  <rect x="246" y="174" width="14" height="20" fill="#92400e" rx="2"/>

  <!-- Child sitting on bench -->
  <!-- Legs dangling, looking down at shoe -->
  <line x1="140" y1="148" x2="118" y2="162" stroke="#4c1d95" stroke-width="10" stroke-linecap="round"/>
  <line x1="160" y1="148" x2="182" y2="162" stroke="#4c1d95" stroke-width="10" stroke-linecap="round"/>

  <!-- Left shoe (untied laces hanging) -->
  <ellipse cx="110" cy="166" rx="16" ry="9" fill="#374151" rx2="2"/>
  <path d="M 102 162 Q 95 155 90 165" stroke="#dc2626" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 108 161 Q 100 152 95 160" stroke="#dc2626" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Shoelace ends hanging loose -->
  <line x1="90"  y1="165" x2="85"  y2="175" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>
  <line x1="95"  y1="160" x2="88"  y2="170" stroke="#dc2626" stroke-width="2" stroke-linecap="round"/>

  <!-- Right shoe -->
  <ellipse cx="190" cy="166" rx="16" ry="9" fill="#374151"/>

  <!-- Body (seated upright) -->
  <rect x="138" y="110" width="24" height="40" fill="#dc2626" rx="10"/>

  <!-- Arms: one pointing at shoe, one on lap -->
  <line x1="138" y1="122" x2="116" y2="148" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="113" cy="151" r="7" fill="#fbbf24"/>
  <line x1="162" y1="125" x2="178" y2="148" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="180" cy="151" r="7" fill="#fbbf24"/>

  <!-- Head looking down -->
  <circle cx="150" cy="90" r="21" fill="#fbbf24"/>
  <path d="M 142 90 Q 145 93 148 90" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 152 90 Q 155 93 158 90" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 143 101 Q 150 97 157 101" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Question mark near shoe area -->
  <text x="68" y="148" font-size="26" fill="#7c3aed" opacity="0.7" font-weight="bold">?</text>
</svg>
