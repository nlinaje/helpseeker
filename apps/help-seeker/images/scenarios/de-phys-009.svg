<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#f5f3ff" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#ddd6fe"/>

  <!-- Desk -->
  <rect x="80" y="148" width="180" height="10" fill="#92400e" rx="3"/>
  <rect x="100" y="158" width="11" height="22" fill="#92400e" rx="2"/>
  <rect x="239" y="158" width="11" height="22" fill="#92400e" rx="2"/>

  <!-- Large water bottle on desk (can't open cap) -->
  <rect x="186" y="90" width="36" height="60" fill="#bfdbfe" rx="8" stroke="#93c5fd" stroke-width="2"/>
  <!-- Bottle cap (stuck, shown in red) -->
  <rect x="189" y="82" width="30" height="14" fill="#dc2626" rx="5"/>
  <!-- Water inside -->
  <rect x="188" y="120" width="32" height="28" fill="#60a5fa" rx="0" opacity="0.5"/>
  <!-- Waves in bottle -->
  <path d="M 188 120 Q 200 115 222 120" stroke="#93c5fd" stroke-width="1.5" fill="none"/>
  <!-- Angry cap indicator -->
  <text x="232" y="90" font-size="18" fill="#dc2626" opacity="0.7" font-weight="bold">!</text>

  <!-- Thirst drop near child -->
  <text x="110" y="105" font-size="22" fill="#60a5fa" opacity="0.7">💧</text>

  <!-- Child reaching for bottle, frustrated -->
  <circle cx="130" cy="92" r="20" fill="#fbbf24"/>
  <circle cx="123" cy="88" r="3"  fill="#374151"/>
  <circle cx="137" cy="88" r="3"  fill="#374151"/>
  <path d="M 124 101 Q 130 97 136 101" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="118" y="112" width="24" height="38" fill="#7c3aed" rx="10"/>

  <!-- Right arm reaching for bottle cap -->
  <line x1="142" y1="116" x2="186" y2="88" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="189" cy="86" r="8"  fill="#fbbf24"/>

  <!-- Left arm on desk -->
  <line x1="118" y1="124" x2="96" y2="148" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="93"  cy="151" r="7" fill="#fbbf24"/>

  <!-- Legs -->
  <line x1="124" y1="150" x2="116" y2="183" stroke="#4c1d95" stroke-width="9" stroke-linecap="round"/>
  <line x1="138" y1="150" x2="146" y2="183" stroke="#4c1d95" stroke-width="9" stroke-linecap="round"/>
</svg>
