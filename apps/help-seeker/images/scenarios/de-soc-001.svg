<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="320" height="200" fill="#f0fdf4" rx="12"/>
  <!-- Floor -->
  <rect x="0" y="183" width="320" height="17" fill="#bbf7d0"/>

  <!-- Blackboard -->
  <rect x="8"  y="10" width="140" height="90" fill="#1f2937" rx="5"/>
  <rect x="14" y="16" width="128" height="78" fill="#374151" rx="3"/>
  <!-- Chalk writing lines -->
  <line x1="24"  y1="36" x2="110" y2="36" stroke="#d1d5db" stroke-width="2" opacity="0.6"/>
  <line x1="24"  y1="52" x2="96"  y2="52" stroke="#d1d5db" stroke-width="2" opacity="0.6"/>
  <line x1="24"  y1="68" x2="104" y2="68" stroke="#d1d5db" stroke-width="2" opacity="0.6"/>
  <line x1="24"  y1="84" x2="88"  y2="84" stroke="#d1d5db" stroke-width="2" opacity="0.6"/>
  <!-- Chalk tray -->
  <rect x="8" y="100" width="140" height="6" fill="#374151" rx="1"/>
  <rect x="24" y="101" width="12" height="4" fill="#f9fafb" rx="1"/>

  <!-- Background child (seated, no detail) -->
  <circle cx="240" cy="118" r="14" fill="#fde68a"/>
  <rect x="229" y="132" width="20" height="22" fill="#0891b2" rx="7"/>

  <!-- Background desk -->
  <rect x="215" y="148" width="70" height="8" fill="#92400e" rx="2"/>

  <!-- Foreground desk -->
  <rect x="100" y="155" width="90" height="10" fill="#92400e" rx="2"/>
  <rect x="114" y="165" width="10" height="18" fill="#92400e" rx="2"/>
  <rect x="166" y="165" width="10" height="18" fill="#92400e" rx="2"/>

  <!-- Child at foreground desk — HAND RAISED -->
  <!-- Head -->
  <circle cx="145" cy="112" r="21" fill="#fbbf24"/>
  <circle cx="138" cy="108" r="3" fill="#374151"/>
  <circle cx="152" cy="108" r="3" fill="#374151"/>
  <path d="M 139 121 Q 145 125 151 121" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="133" y="133" width="24" height="28" fill="#dc2626" rx="10"/>

  <!-- Left arm on desk -->
  <line x1="133" y1="142" x2="112" y2="153" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="109" cy="154" r="7" fill="#fbbf24"/>

  <!-- Right arm RAISED (high, elbow bent upward) -->
  <line x1="157" y1="136" x2="175" y2="90" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <line x1="175" y1="90"  x2="178" y2="55" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="179" cy="50" r="8" fill="#fbbf24"/>

  <!-- WC sign in top-right corner -->
  <rect x="266" y="14" width="48" height="54" fill="#dbeafe" rx="7" stroke="#93c5fd" stroke-width="2"/>
  <text x="290" y="50" font-size="26" text-anchor="middle">🚻</text>
  <text x="290" y="63" font-size="9" text-anchor="middle" fill="#1d4ed8" font-weight="bold">WC</text>
</svg>
