<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#f0fdf4" rx="12"/>
  <!-- Playground ground -->
  <rect x="0" y="170" width="320" height="30" fill="#bbf7d0"/>
  <!-- Grass patches -->
  <ellipse cx="40"  cy="170" rx="25" ry="6" fill="#86efac" opacity="0.6"/>
  <ellipse cx="280" cy="170" rx="25" ry="6" fill="#86efac" opacity="0.6"/>

  <!-- Group of children playing together (right side) -->
  <!-- Child group A -->
  <circle cx="220" cy="110" r="15" fill="#86efac"/>
  <rect   cx="208" cy="125" width="20" height="38" fill="#6d28d9" rx="8"/>
  <rect x="208" y="125" width="20" height="38" fill="#6d28d9" rx="8"/>
  <line x1="208" y1="134" x2="196" y2="148" stroke="#86efac" stroke-width="7" stroke-linecap="round"/>
  <line x1="228" y1="134" x2="238" y2="148" stroke="#86efac" stroke-width="7" stroke-linecap="round"/>
  <line x1="214" y1="163" x2="208" y2="183" stroke="#4c1d95" stroke-width="8" stroke-linecap="round"/>
  <line x1="226" y1="163" x2="232" y2="183" stroke="#4c1d95" stroke-width="8" stroke-linecap="round"/>
  <!-- Child group B -->
  <circle cx="265" cy="105" r="15" fill="#fca5a5"/>
  <rect x="253" y="120" width="20" height="38" fill="#dc2626" rx="8"/>
  <line x1="253" y1="130" x2="240" y2="145" stroke="#fca5a5" stroke-width="7" stroke-linecap="round"/>
  <line x1="273" y1="130" x2="285" y2="145" stroke="#fca5a5" stroke-width="7" stroke-linecap="round"/>
  <line x1="259" y1="158" x2="252" y2="183" stroke="#9f1239" stroke-width="8" stroke-linecap="round"/>
  <line x1="271" y1="158" x2="278" y2="183" stroke="#9f1239" stroke-width="8" stroke-linecap="round"/>
  <!-- Ball between them (playing) -->
  <circle cx="242" cy="150" r="10" fill="#f59e0b" stroke="#d97706" stroke-width="1.5"/>
  <path d="M 236 146 Q 242 140 248 146" stroke="#92400e" stroke-width="1" fill="none"/>

  <!-- Lone child (left side, watching longingly) -->
  <circle cx="62" cy="110" r="21" fill="#fbbf24"/>
  <!-- Longing eyes looking toward group -->
  <circle cx="55" cy="107" r="3"  fill="#374151"/>
  <circle cx="69" cy="107" r="3"  fill="#374151"/>
  <!-- Slight sad mouth -->
  <path d="M 56 119 Q 62 116 68 119" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="50" y="131" width="24" height="50" fill="#7c3aed" rx="10"/>

  <!-- Arms relaxed at sides -->
  <line x1="50"  y1="142" x2="32"  y2="162" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="29" cy="165" r="7"  fill="#fbbf24"/>
  <line x1="74"  y1="140" x2="90"  y2="158" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="93" cy="161" r="7"  fill="#fbbf24"/>

  <!-- Legs -->
  <line x1="56"  y1="181" x2="48"  y2="183" stroke="#4c1d95" stroke-width="9" stroke-linecap="round"/>
  <line x1="70"  y1="181" x2="78"  y2="183" stroke="#4c1d95" stroke-width="9" stroke-linecap="round"/>

  <!-- Arrow indicating desire to join -->
  <path d="M 96 150 Q 150 130 198 130" stroke="#6d28d9" stroke-width="2" fill="none" stroke-dasharray="5,3" opacity="0.6"/>
  <polygon points="196,124 206,130 196,136" fill="#6d28d9" opacity="0.6"/>
</svg>
