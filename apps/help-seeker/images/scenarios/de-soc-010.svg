<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#f0fdf4" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#bbf7d0"/>

  <!-- School building entrance -->
  <!-- Building walls -->
  <rect x="30" y="30" width="260" height="140" fill="#e5e7eb" rx="4"/>
  <!-- Windows -->
  <rect x="48"  y="50" width="40" height="35" fill="#bfdbfe" rx="3" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="106" y="50" width="40" height="35" fill="#bfdbfe" rx="3" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="220" y="50" width="40" height="35" fill="#bfdbfe" rx="3" stroke="#93c5fd" stroke-width="1.5"/>
  <rect x="274" y="50" width="40" height="35" fill="#bfdbfe" rx="3" stroke="#93c5fd" stroke-width="1.5"/>
  <!-- School sign -->
  <rect x="100" y="40" width="120" height="22" fill="#6d28d9" rx="3"/>
  <text x="160" y="56" font-size="11" text-anchor="middle" fill="white" font-weight="bold">NEUE SCHULE</text>
  <!-- Main door (big, open/inviting but confusing) -->
  <rect x="140" y="108" width="40" height="62" fill="#fde68a" rx="3" stroke="#d97706" stroke-width="2"/>
  <circle cx="143" cy="138" r="4" fill="#d97706"/>
  <!-- Side doors -->
  <rect x="60"  y="120" width="30" height="50" fill="#fde68a" rx="2" stroke="#d97706" stroke-width="1.5"/>
  <rect x="230" y="120" width="30" height="50" fill="#fde68a" rx="2" stroke="#d97706" stroke-width="1.5"/>

  <!-- Directional arrows going different ways (confusing) -->
  <text x="86"  y="148" font-size="12" fill="#dc2626" opacity="0.7">↑</text>
  <text x="234" y="148" font-size="12" fill="#dc2626" opacity="0.7">↑</text>
  <text x="155" y="108" font-size="12" fill="#6d28d9" opacity="0.7">↑</text>

  <!-- Child at entrance, lost/uncertain -->
  <circle cx="160" cy="148" r="18" fill="#fbbf24"/>
  <path d="M 153 144 Q 156 141 159 144" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 162 144 Q 165 141 168 144" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 154 155 Q 160 152 166 155" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Bag on back -->
  <rect x="168" y="148" width="22" height="28" fill="#6d28d9" rx="4" opacity="0.8"/>

  <!-- Question mark above head -->
