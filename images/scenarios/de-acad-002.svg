<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#fffbeb" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#fde68a"/>

  <!-- Desk -->
  <rect x="60" y="148" width="210" height="11" fill="#92400e" rx="3"/>
  <rect x="80"  y="159" width="11" height="22" fill="#92400e" rx="2"/>
  <rect x="249" y="159" width="11" height="22" fill="#92400e" rx="2"/>

  <!-- Worksheet on desk with confusing instructions -->
  <rect x="140" y="88" width="120" height="62" fill="white" rx="5" stroke="#fbbf24" stroke-width="1.5"/>
  <line x1="152" y1="103" x2="248" y2="103" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="152" y1="115" x2="248" y2="115" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="152" y1="127" x2="248" y2="127" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="152" y1="139" x2="248" y2="139" stroke="#e5e7eb" stroke-width="1"/>
  <!-- "Instructions" — illegible squiggles -->
  <path d="M 152 100 Q 160 96 168 100 Q 176 104 184 100" stroke="#374151" stroke-width="1.5" fill="none"/>
  <path d="M 152 112 Q 162 108 172 112 Q 180 116 188 112" stroke="#374151" stroke-width="1.5" fill="none"/>
  <path d="M 152 124 Q 160 120 170 124" stroke="#374151" stroke-width="1.5" fill="none"/>

  <!-- Big question mark over worksheet -->
  <text x="230" y="76" font-size="36" fill="#d97706" opacity="0.8" font-weight="bold">?</text>

  <!-- Child at desk, puzzled expression -->
  <circle cx="90" cy="100" r="21" fill="#fbbf24"/>
  <path d="M 82 94 Q 85 91 88 94" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 93 94 Q 96 91 99 94" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 83 110 Q 90 106 97 110" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Raised eyebrows -->
  <path d="M 80 88 Q 84 85 88 88" stroke="#374151" stroke-width="1.5" fill="none"/>
  <path d="M 92 88 Q 96 85 100 88" stroke="#374151" stroke-width="1.5" fill="none"/>

  <!-- Body -->
  <rect x="78" y="121" width="24" height="30" fill="#d97706" rx="10"/>

  <!-- Arms on desk -->
  <line x1="78"  y1="130" x2="58"  y2="148" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="55" cy="150" r="7"  fill="#fbbf24"/>
  <line x1="102" y1="130" x2="140" y2="144" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <circle cx="143" cy="145" r="7" fill="#fbbf24"/>
</svg>
