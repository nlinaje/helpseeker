<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#eff6ff" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#bfdbfe"/>

  <!-- Rain drops / sad atmosphere -->
  <line x1="60"  y1="20" x2="55"  y2="45"  stroke="#93c5fd" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="90"  y1="10" x2="85"  y2="35"  stroke="#93c5fd" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="230" y1="15" x2="225" y2="40"  stroke="#93c5fd" stroke-width="2" stroke-linecap="round" opacity="0.6"/>
  <line x1="260" y1="22" x2="255" y2="47"  stroke="#93c5fd" stroke-width="2" stroke-linecap="round" opacity="0.5"/>
  <line x1="40"  y1="35" x2="35"  y2="60"  stroke="#93c5fd" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="280" y1="30" x2="275" y2="55"  stroke="#93c5fd" stroke-width="2" stroke-linecap="round" opacity="0.4"/>

  <!-- Cloud above child -->
  <circle cx="148" cy="50"  r="14" fill="#bfdbfe" opacity="0.9"/>
  <circle cx="165" cy="44"  r="18" fill="#bfdbfe" opacity="0.9"/>
  <circle cx="182" cy="50"  r="14" fill="#bfdbfe" opacity="0.9"/>
  <!-- Rain from cloud -->
  <line x1="155" y1="64" x2="150" y2="80" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="165" y1="62" x2="160" y2="78" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>
  <line x1="175" y1="64" x2="170" y2="80" stroke="#60a5fa" stroke-width="2" stroke-linecap="round"/>

  <!-- Child slumped, sad, sitting on ground -->
  <!-- Head hanging low -->
  <circle cx="160" cy="108" r="22" fill="#fbbf24"/>
  <!-- Sad eyes with tears -->
  <path d="M 151 104 Q 154 101 157 104" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 163 104 Q 166 101 169 104" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Tears running down -->
  <path d="M 152 108 Q 150 116 152 122" stroke="#93c5fd" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 168 108 Q 170 116 168 122" stroke="#93c5fd" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Frown -->
  <path d="M 152 118 Q 160 113 168 118" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Body slumped (slightly hunched) -->
  <rect x="148" y="130" width="24" height="44" fill="#60a5fa" rx="10"/>

  <!-- Arms hanging / hugging knees -->
  <line x1="148" y1="140" x2="130" y2="155" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="127" cy="158" r="7" fill="#fbbf24"/>
  <line x1="172" y1="140" x2="190" y2="155" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="193" cy="158" r="7" fill="#fbbf24"/>

  <!-- Legs -->
  <line x1="154" y1="174" x2="146" y2="183" stroke="#1d4ed8" stroke-width="9" stroke-linecap="round"/>
  <line x1="168" y1="174" x2="176" y2="183" stroke="#1d4ed8" stroke-width="9" stroke-linecap="round"/>
</svg>
