<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#fff7ed" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#fed7aa"/>

  <!-- Photo frame child is holding / looking at -->
  <rect x="186" y="68" width="90" height="72" fill="white" rx="5" stroke="#d97706" stroke-width="4"/>
  <rect x="192" y="74" width="78" height="60" fill="#fef9c3" rx="3"/>
  <!-- Family in photo (simplified) -->
  <circle cx="216" cy="94"  r="10" fill="#fbbf24"/>
  <circle cx="232" cy="90"  r="10" fill="#86efac"/>
  <circle cx="248" cy="94"  r="10" fill="#fca5a5"/>
  <!-- Small hearts over family -->
  <text x="231" y="80" font-size="10" text-anchor="middle">❤️</text>
  <!-- House in photo background -->
  <rect x="200" y="108" width="64" height="22" fill="#dbeafe" rx="2" opacity="0.6"/>
  <polygon points="200,108 232,90 264,108" fill="#bfdbfe" opacity="0.6"/>
  <!-- Photo label -->
  <text x="231" y="150" font-size="8" text-anchor="middle" fill="#92400e">Meine Familie</text>

  <!-- Heart trail from child to photo (missing them) -->
  <text x="160" y="100" font-size="12" fill="#dc2626" opacity="0.6">♥</text>
  <text x="173" y="92"  font-size="10" fill="#dc2626" opacity="0.4">♥</text>
  <text x="183" y="86"  font-size="8"  fill="#dc2626" opacity="0.3">♥</text>

  <!-- Child looking at photo, sad/longing -->
  <circle cx="96" cy="100" r="22" fill="#fbbf24"/>
  <!-- Longing/sad eyes -->
  <path d="M 87 96 Q 90 93 93 96" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 99 96 Q 102 93 105 96" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Tear -->
  <path d="M 88 100 Q 86 108 88 114" stroke="#93c5fd" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Sad mouth -->
  <path d="M 88 113 Q 96 109 104 113" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="84"  y="122" width="24" height="48" fill="#7c3aed" rx="10"/>

  <!-- Arms holding / reaching toward photo -->
  <line x1="108" y1="126" x2="182" y2="100" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="185" cy="99" r="8"  fill="#fbbf24"/>
  <line x1="84"  y1="130" x2="66"  y2="150" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="63" cy="153" r="7"  fill="#fbbf24"/>

  <!-- Legs -->
  <line x1="90"  y1="170" x2="82"  y2="183" stroke="#4c1d95" stroke-width="9" stroke-linecap="round"/>
  <line x1="104" y1="170" x2="112" y2="183" stroke="#4c1d95" stroke-width="9" stroke-linecap="round"/>
</svg>
