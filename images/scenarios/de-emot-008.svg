<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#fff7ed" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#fed7aa"/>

  <!-- Swirly stomach pain indicator -->
  <path d="M 192 108 Q 210 96 220 108 Q 230 120 218 128 Q 206 136 196 124 Q 186 112 198 104" stroke="#dc2626" stroke-width="2.5" fill="none" opacity="0.6" stroke-linecap="round"/>
  <circle cx="212" cy="116" r="18" fill="#fee2e2" opacity="0.5"/>
  <text x="212" y="122" font-size="20" text-anchor="middle" fill="#dc2626" opacity="0.6">~</text>

  <!-- Child holding stomach, worried/queasy -->
  <circle cx="130" cy="82" r="22" fill="#fbbf24"/>
  <!-- Queasy/pale expression -->
  <circle cx="122" cy="78" r="3.5" fill="#374151"/>
  <circle cx="138" cy="78" r="3.5" fill="#374151"/>
  <!-- Wavy/nauseous mouth -->
  <path d="M 122 92 Q 126 96 130 92 Q 134 88 138 92" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Pale/green tinge on face -->
  <circle cx="119" cy="88" r="6" fill="#bbf7d0" opacity="0.5"/>
  <circle cx="141" cy="88" r="6" fill="#bbf7d0" opacity="0.5"/>
  <!-- Sweat drops -->
  <ellipse cx="115" cy="74" rx="3" ry="4" fill="#93c5fd" opacity="0.7"/>

  <!-- Body (both hands on stomach) -->
  <rect x="118" y="104" width="24" height="50" fill="#059669" rx="10"/>

  <!-- Both hands on stomach area -->
  <line x1="118" y1="114" x2="102" y2="126" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="99"  cy="129" r="8"  fill="#fbbf24"/>
  <line x1="142" y1="114" x2="156" y2="126" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="159" cy="129" r="8"  fill="#fbbf24"/>
  <!-- Stomach area highlight -->
  <ellipse cx="130" cy="128" rx="22" ry="12" fill="#fca5a5" opacity="0.2"/>

  <!-- Legs -->
  <line x1="124" y1="154" x2="116" y2="183" stroke="#065f46" stroke-width="9" stroke-linecap="round"/>
  <line x1="138" y1="154" x2="146" y2="183" stroke="#065f46" stroke-width="9" stroke-linecap="round"/>
</svg>
