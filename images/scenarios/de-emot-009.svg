<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#fff7ed" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#fed7aa"/>

  <!-- Test paper with bad grade -->
  <rect x="168" y="48" width="110" height="90" fill="white" rx="5" stroke="#e5e7eb" stroke-width="1.5" transform="rotate(-5 223 93)"/>
  <text x="203" y="74"  font-size="11" text-anchor="middle" fill="#374151" font-weight="bold" transform="rotate(-5 223 74)">Prüfung</text>
  <line x1="178" y1="82" x2="272" y2="74" stroke="#e5e7eb" stroke-width="1"/>
  <!-- Grade: big red "4-" or similar poor result -->
  <circle cx="228" cy="110" r="26" fill="#fee2e2" opacity="0.7" transform="rotate(-5 228 110)"/>
  <text x="224" y="118" font-size="30" text-anchor="middle" fill="#dc2626" font-weight="bold" transform="rotate(-5 224 118)">4-</text>
  <!-- Red X marks on paper -->
  <text x="192" y="100" font-size="12" fill="#dc2626" opacity="0.6" transform="rotate(-5 192 100)">✗ ✗ ✗</text>

  <!-- Disappointed child looking at paper -->
  <circle cx="90" cy="96" r="21" fill="#fbbf24"/>
  <!-- Deeply sad eyes (downward slant) -->
  <path d="M 82 91 Q 85 94 88 91" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 93 91 Q 96 94 99 91" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Quivering lip / deep frown -->
  <path d="M 82 107 Q 90 102 98 107" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Tears -->
  <path d="M 83 96 Q 81 104 83 110" stroke="#93c5fd" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 97 96 Q 99 104 97 110" stroke="#93c5fd" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Body (slumped) -->
  <rect x="78" y="117" width="24" height="50" fill="#d97706" rx="10"/>

  <!-- Arm holding paper downward (dejected) -->
  <line x1="102" y1="122" x2="160" y2="108" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="163" cy="107" r="8"  fill="#fbbf24"/>
  <line x1="78"  y1="128" x2="60"  y2="148" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="57" cy="151" r="7"  fill="#fbbf24"/>

  <!-- Legs -->
  <line x1="84"  y1="167" x2="76"  y2="183" stroke="#92400e" stroke-width="9" stroke-linecap="round"/>
  <line x1="98"  y1="167" x2="106" y2="183" stroke="#92400e" stroke-width="9" stroke-linecap="round"/>
</svg>
