<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="320" height="200" fill="#f5f3ff" rx="12"/>
  <!-- Floor -->
  <rect x="0" y="183" width="320" height="17" fill="#ddd6fe"/>

  <!-- Bookshelf frame -->
  <rect x="188" y="8"   width="8"   height="172" fill="#92400e"/>
  <rect x="302" y="8"   width="8"   height="172" fill="#92400e"/>
  <rect x="186" y="8"   width="126" height="9"   fill="#92400e" rx="2"/>
  <rect x="186" y="174" width="126" height="9"   fill="#92400e"/>
  <!-- Shelf boards -->
  <rect x="188" y="74"  width="122" height="7"   fill="#92400e"/>
  <rect x="188" y="136" width="122" height="7"   fill="#92400e"/>

  <!-- Top shelf books (y 17–74) -->
  <rect x="196" y="18" width="16" height="53" fill="#6d28d9" rx="2"/>
  <rect x="214" y="23" width="14" height="48" fill="#059669" rx="2"/>
  <!-- Star book, slightly taller — child's favourite -->
  <rect x="231" y="14" width="20" height="57" fill="#f59e0b" rx="2"/>
  <text x="241" y="48" font-size="18" text-anchor="middle" fill="white">★</text>
  <rect x="254" y="20" width="15" height="51" fill="#dc2626" rx="2"/>
  <rect x="272" y="18" width="17" height="53" fill="#0891b2" rx="2"/>

  <!-- Middle shelf books (y 81–136) -->
  <rect x="196" y="82" width="15" height="51" fill="#7c3aed" rx="2"/>
  <rect x="213" y="86" width="18" height="47" fill="#d97706" rx="2"/>
  <rect x="234" y="82" width="14" height="51" fill="#059669" rx="2"/>
  <rect x="250" y="84" width="17" height="49" fill="#6d28d9" rx="2"/>
  <rect x="270" y="82" width="15" height="51" fill="#dc2626" rx="2"/>

  <!-- Bottom shelf books (y 143–174) -->
  <rect x="196" y="144" width="18" height="28" fill="#0891b2" rx="2"/>
  <rect x="217" y="148" width="14" height="24" fill="#7c3aed" rx="2"/>
  <rect x="234" y="144" width="20" height="28" fill="#d97706" rx="2"/>
  <rect x="257" y="146" width="15" height="26" fill="#059669" rx="2"/>

  <!-- Child (x≈100, reaching right arm up toward shelf) -->
  <!-- Head -->
  <circle cx="100" cy="92" r="21" fill="#fbbf24"/>
  <circle cx="93"  cy="88" r="3"  fill="#374151"/>
  <circle cx="107" cy="88" r="3"  fill="#374151"/>
  <path d="M 94 102 Q 100 107 106 102" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="88" y="113" width="24" height="46" fill="#6d28d9" rx="10"/>

  <!-- Left arm (relaxed, down) -->
  <line x1="88"  y1="122" x2="70"  y2="140" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="68" cy="143" r="7" fill="#fbbf24"/>

  <!-- Right arm (reaching up — hand stops short of shelf at x=188) -->
  <line x1="112" y1="116" x2="178" y2="32"  stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="180" cy="28" r="8" fill="#fbbf24"/>

  <!-- Legs -->
  <line x1="94"  y1="159" x2="87"  y2="183" stroke="#4c1d95" stroke-width="9" stroke-linecap="round"/>
  <line x1="110" y1="159" x2="117" y2="183" stroke="#4c1d95" stroke-width="9" stroke-linecap="round"/>
</svg>
