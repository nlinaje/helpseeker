<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#f5f3ff" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#ddd6fe"/>

  <!-- Door frame (wall) -->
  <rect x="170" y="0" width="150" height="200" fill="#e5e7eb"/>
  <!-- Door -->
  <rect x="180" y="14" width="110" height="170" fill="#fde68a" rx="3" stroke="#d97706" stroke-width="3"/>
  <!-- Door panels -->
  <rect x="188" y="22"  width="44" height="58" fill="#fbbf24" rx="3" stroke="#d97706" stroke-width="1"/>
  <rect x="238" y="22"  width="44" height="58" fill="#fbbf24" rx="3" stroke="#d97706" stroke-width="1"/>
  <rect x="188" y="92"  width="44" height="76" fill="#fbbf24" rx="3" stroke="#d97706" stroke-width="1"/>
  <rect x="238" y="92"  width="44" height="76" fill="#fbbf24" rx="3" stroke="#d97706" stroke-width="1"/>
  <!-- Handle -->
  <circle cx="183" cy="100" r="7"  fill="#92400e"/>
  <rect   x="175"  y="97"  width="11" height="7" fill="#92400e" rx="3"/>
  <!-- Stuck X -->
  <text x="240" y="68" font-size="30" text-anchor="middle" fill="#dc2626" opacity="0.75" font-weight="bold">✗</text>

  <!-- Child pulling handle, leaning back -->
  <circle cx="82" cy="88" r="20" fill="#fbbf24"/>
  <circle cx="75" cy="84" r="3"  fill="#374151"/>
  <circle cx="89" cy="84" r="3"  fill="#374151"/>
  <path d="M 76 98 Q 82 95 88 98" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body tilted backward (effort) -->
  <rect x="70" y="108" width="24" height="44" fill="#dc2626" rx="10" transform="rotate(-12 82 130)"/>

  <!-- Arms stretched forward toward handle -->
  <line x1="94"  y1="112" x2="168" y2="100" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="171" cy="99" r="8" fill="#fbbf24"/>
  <line x1="82"  y1="108" x2="168" y2="108" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>

  <!-- Legs braced -->
  <line x1="76"  y1="150" x2="60"  y2="183" stroke="#9f1239" stroke-width="9" stroke-linecap="round"/>
  <line x1="90"  y1="150" x2="98"  y2="183" stroke="#9f1239" stroke-width="9" stroke-linecap="round"/>
</svg>
