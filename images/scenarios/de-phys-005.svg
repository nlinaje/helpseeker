<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#f5f3ff" rx="12"/>
  <!-- Ground / pavement -->
  <rect x="0" y="160" width="320" height="40" fill="#ddd6fe"/>
  <!-- Ground texture lines -->
  <line x1="0" y1="170" x2="320" y2="170" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>
  <line x1="0" y1="180" x2="320" y2="180" stroke="#c4b5fd" stroke-width="1" opacity="0.5"/>

  <!-- Scraped knee (red circle on leg) -->
  <!-- Child seated on ground -->
  <!-- Legs spread out in front -->
  <line x1="148" y1="148" x2="190" y2="163" stroke="#4c1d95" stroke-width="10" stroke-linecap="round"/>
  <line x1="148" y1="148" x2="106" y2="163" stroke="#4c1d95" stroke-width="10" stroke-linecap="round"/>
  <!-- Shoes -->
  <ellipse cx="196" cy="165" rx="12" ry="7" fill="#374151"/>
  <ellipse cx="100"  cy="165" rx="12" ry="7" fill="#374151"/>
  <!-- Scraped knee (right leg) -->
  <circle cx="175" cy="157" r="10" fill="#fbbf24"/>
  <circle cx="175" cy="157" r="7"  fill="#fee2e2"/>
  <circle cx="175" cy="157" r="4"  fill="#dc2626" opacity="0.8"/>

  <!-- Body sitting (upright) -->
  <rect x="135" y="110" width="26" height="40" fill="#6d28d9" rx="10"/>

  <!-- Left arm supporting on ground -->
  <line x1="135" y1="125" x2="110" y2="148" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="107" cy="151" r="7" fill="#fbbf24"/>

  <!-- Right arm holding knee -->
  <line x1="161" y1="122" x2="178" y2="148" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="180" cy="151" r="7" fill="#fbbf24"/>

  <!-- Head looking down at knee -->
  <circle cx="148" cy="90" r="21" fill="#fbbf24"/>
  <!-- Looking-down eyes -->
  <path d="M 140 90 Q 143 93 146 90" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 150 90 Q 153 93 156 90" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <!-- Sad mouth -->
  <path d="M 141 101 Q 148 97 155 101" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Tear -->
  <ellipse cx="140" cy="103" rx="3" ry="4" fill="#93c5fd" opacity="0.9"/>

  <!-- Pain stars near knee -->
  <text x="196" y="150" font-size="16" fill="#f59e0b">✦</text>
  <text x="188" y="140" font-size="12" fill="#dc2626">✦</text>
</svg>
