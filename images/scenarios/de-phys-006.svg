<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#f5f3ff" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#ddd6fe"/>

  <!-- Child wearing jacket, struggling with zipper -->
  <!-- Jacket body (large, prominent) -->
  <rect x="104" y="110" width="72" height="68" fill="#0891b2" rx="12"/>
  <!-- Jacket collar -->
  <path d="M 120 110 L 140 95 L 160 110" fill="#0e7490" stroke="none"/>
  <!-- Zipper track -->
  <line x1="140" y1="112" x2="140" y2="178" stroke="#e5e7eb" stroke-width="3"/>
  <!-- Zipper pull (stuck halfway, can't close) -->
  <rect x="134" y="135" width="12" height="8" fill="#d97706" rx="2"/>
  <!-- Zipper teeth visible (open section above stuck point) -->
  <line x1="136" y1="118" x2="136" y2="135" stroke="#9ca3af" stroke-width="2"/>
  <line x1="144" y1="118" x2="144" y2="135" stroke="#9ca3af" stroke-width="2"/>
  <!-- Open gap indicators -->
  <text x="125" y="130" font-size="10" fill="#dc2626" opacity="0.8">← →</text>

  <!-- Head -->
  <circle cx="140" cy="88" r="21" fill="#fbbf24"/>
  <circle cx="133" cy="84" r="3"  fill="#374151"/>
  <circle cx="147" cy="84" r="3"  fill="#374151"/>
  <path d="M 134 98 Q 140 94 146 98" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Arms (both reaching for zipper) -->
  <line x1="104" y1="128" x2="134" y2="138" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="131" cy="139" r="8" fill="#fbbf24"/>
  <line x1="176" y1="128" x2="148" y2="138" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="151" cy="139" r="8" fill="#fbbf24"/>

  <!-- Legs -->
  <line x1="124" y1="178" x2="116" y2="183" stroke="#075985" stroke-width="9" stroke-linecap="round"/>
  <line x1="156" y1="178" x2="164" y2="183" stroke="#075985" stroke-width="9" stroke-linecap="round"/>

  <!-- Frustration marks -->
  <text x="168" y="80" font-size="18" fill="#d97706" opacity="0.8">!</text>
  <text x="180" y="95" font-size="14" fill="#d97706" opacity="0.6">!</text>
</svg>
