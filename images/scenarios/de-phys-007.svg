<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#f5f3ff" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#ddd6fe"/>

  <!-- Huge heavy backpack on child's back -->
  <!-- Backpack (oversized relative to child) -->
  <rect x="158" y="85"  width="78" height="90" fill="#6d28d9" rx="10"/>
  <rect x="163" y="90"  width="68" height="78" fill="#7c3aed" rx="8"/>
  <!-- Backpack pockets -->
  <rect x="168" y="130" width="58" height="28" fill="#6d28d9" rx="6" stroke="#5b21b6" stroke-width="1.5"/>
  <rect x="168" y="95"  width="25" height="28" fill="#6d28d9" rx="5" stroke="#5b21b6" stroke-width="1.5"/>
  <rect x="200" y="95"  width="26" height="28" fill="#6d28d9" rx="5" stroke="#5b21b6" stroke-width="1.5"/>
  <!-- Backpack straps -->
  <path d="M 163 90 Q 148 100 148 130" stroke="#5b21b6" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M 163 95 Q 155 110 156 130" stroke="#5b21b6" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Weight label -->
  <text x="197" y="120" font-size="12" text-anchor="middle" fill="#ddd6fe" font-weight="bold">SCHWER</text>

  <!-- Child body hunched under weight -->
  <rect x="126" y="118" width="24" height="48" fill="#059669" rx="10" transform="rotate(10 138 142)"/>

  <!-- Head tilted forward under weight -->
  <circle cx="134" cy="100" r="19" fill="#fbbf24"/>
  <circle cx="127" cy="97"  r="3"  fill="#374151"/>
  <circle cx="141" cy="97"  r="3"  fill="#374151"/>
  <path d="M 128 108 Q 134 105 140 108" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Sweat drops -->
  <ellipse cx="120" cy="95" rx="4" ry="5" fill="#93c5fd" opacity="0.8"/>
  <ellipse cx="115" cy="107" rx="3" ry="4" fill="#93c5fd" opacity="0.6"/>

  <!-- Left arm hanging down -->
  <line x1="126" y1="128" x2="108" y2="155" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="106" cy="158" r="7" fill="#fbbf24"/>

  <!-- Bent knees / tired legs -->
  <line x1="132" y1="166" x2="122" y2="183" stroke="#065f46" stroke-width="9" stroke-linecap="round"/>
  <line x1="148" y1="163" x2="156" y2="183" stroke="#065f46" stroke-width="9" stroke-linecap="round"/>
</svg>
