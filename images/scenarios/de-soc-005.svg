<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#f0fdf4" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#bbf7d0"/>

  <!-- Classroom — all seats taken -->
  <!-- Desk row 1 -->
  <rect x="30"  y="108" width="56" height="9" fill="#92400e" rx="2"/>
  <!-- Student 1 at desk (occupied) -->
  <circle cx="58"  cy="92" r="14" fill="#86efac"/>
  <rect x="47" y="106" width="20" height="28" fill="#0891b2" rx="8"/>

  <!-- Desk row 2 -->
  <rect x="104" y="108" width="56" height="9" fill="#92400e" rx="2"/>
  <!-- Student 2 -->
  <circle cx="132" cy="92" r="14" fill="#fca5a5"/>
  <rect x="121" y="106" width="20" height="28" fill="#7c3aed" rx="8"/>

  <!-- Desk row 3 -->
  <rect x="178" y="108" width="56" height="9" fill="#92400e" rx="2"/>
  <!-- Student 3 -->
  <circle cx="206" cy="92" r="14" fill="#fde68a"/>
  <rect x="195" y="106" width="20" height="28" fill="#059669" rx="8"/>

  <!-- "VOLL" / occupied signs on desks -->
  <text x="58"  y="120" font-size="9" text-anchor="middle" fill="#374151" opacity="0.5">✓</text>
  <text x="132" y="120" font-size="9" text-anchor="middle" fill="#374151" opacity="0.5">✓</text>
  <text x="206" y="120" font-size="9" text-anchor="middle" fill="#374151" opacity="0.5">✓</text>

  <!-- Child standing with bag, no seat -->
  <circle cx="282" cy="92" r="20" fill="#fbbf24"/>
  <circle cx="275" cy="88" r="3"  fill="#374151"/>
  <circle cx="289" cy="88" r="3"  fill="#374151"/>
  <path d="M 276 102 Q 282 98 288 102" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="270" y="112" width="24" height="50" fill="#dc2626" rx="10"/>

  <!-- Bag hanging from arm -->
  <line x1="270" y1="122" x2="252" y2="140" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="249" cy="143" r="7" fill="#fbbf24"/>
  <!-- Bag shape -->
  <rect x="234" y="138" width="22" height="28" fill="#6d28d9" rx="5"/>
  <rect x="238" y="134" width="14" height="6"  fill="#6d28d9" rx="3"/>

  <!-- Other arm questioning -->
  <line x1="294" y1="118" x2="310" y2="138" stroke="#fbbf24" stroke-width="9" stroke-linecap="round"/>
  <circle cx="312" cy="141" r="7" fill="#fbbf24"/>

  <!-- Legs -->
  <line x1="276" y1="162" x2="268" y2="183" stroke="#9f1239" stroke-width="9" stroke-linecap="round"/>
  <line x1="290" y1="162" x2="298" y2="183" stroke="#9f1239" stroke-width="9" stroke-linecap="round"/>
</svg>
