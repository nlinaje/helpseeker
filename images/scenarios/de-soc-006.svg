<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#f0fdf4" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#bbf7d0"/>

  <!-- Blackboard (teacher explained already) -->
  <rect x="8" y="10" width="130" height="85" fill="#1f2937" rx="5"/>
  <rect x="14" y="16" width="118" height="73" fill="#374151" rx="3"/>
  <text x="73" y="58" font-size="10" text-anchor="middle" fill="#9ca3af">Aufgabe: Schreibt</text>
  <text x="73" y="72" font-size="10" text-anchor="middle" fill="#9ca3af">einen Aufsatz über...</text>
  <!-- Chalk arrow (instruction already given) -->
  <rect x="8" y="95" width="130" height="6" fill="#374151"/>

  <!-- Other student working (thought bubble with words) -->
  <circle cx="258" cy="108" r="16" fill="#fde68a"/>
  <rect x="244" y="124" width="22" height="40" fill="#059669" rx="9"/>
  <!-- Busy working, pencil in hand -->
  <line x1="266" y1="130" x2="280" y2="148" stroke="#fde68a" stroke-width="7" stroke-linecap="round"/>
  <!-- Paper on their desk -->
  <rect x="192" y="138" width="72" height="10" fill="#92400e" rx="2"/>
  <rect x="202" y="110" width="54" height="28" fill="white" rx="3" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="208" y1="120" x2="250" y2="120" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="208" y1="128" x2="250" y2="128" stroke="#e5e7eb" stroke-width="1"/>

  <!-- Child with empty thought bubble (didn't hear) -->
  <!-- Thought bubbles -->
  <circle cx="110" cy="100" r="4"  fill="#e5e7eb" opacity="0.8"/>
  <circle cx="120" cy="90"  r="7"  fill="#e5e7eb" opacity="0.8"/>
  <circle cx="135" cy="78"  r="14" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1.5"/>
  <text x="135" y="84" font-size="18" text-anchor="middle" fill="#d1d5db">…</text>

  <!-- Child head -->
  <circle cx="96" cy="112" r="20" fill="#fbbf24"/>
  <circle cx="89" cy="108" r="3"  fill="#374151"/>
  <circle cx="103" cy="108" r="3" fill="#374151"/>
  <path d="M 90 120 Q 96 117 102 120" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <rect x="84" y="132" width="24" height="30" fill="#dc2626" rx="10"/>

  <!-- Blank paper on child's desk -->
  <rect x="60" y="138" width="120" height="10" fill="#92400e" rx="2"/>
  <rect x="72"  y="112" width="56" height="26" fill="white" rx="3" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Arms on desk -->
  <line x1="84"  y1="140" x2="66"  y2="148" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <line x1="108" y1="140" x2="126" y2="148" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
</svg>
