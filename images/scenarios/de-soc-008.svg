<svg viewBox="0 0 320 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="320" height="200" fill="#f0fdf4" rx="12"/>
  <rect x="0" y="183" width="320" height="17" fill="#bbf7d0"/>

  <!-- Cafeteria table -->
  <rect x="30" y="142" width="270" height="12" fill="#92400e" rx="3"/>

  <!-- Other children eating (background) -->
  <!-- Child A eating -->
  <circle cx="80"  cy="115" r="13" fill="#86efac"/>
  <rect x="71"  y="128" width="18" height="30" fill="#6d28d9" rx="7"/>
  <!-- Lunch tray with food -->
  <rect x="52"  y="140" width="56" height="5"  fill="#d97706" rx="2"/>
  <circle cx="66" cy="138" r="6"  fill="#fca5a5"/>
  <circle cx="82" cy="136" r="5"  fill="#86efac"/>
  <circle cx="96" cy="138" r="6"  fill="#fbbf24"/>

  <!-- Child B eating -->
  <circle cx="200" cy="112" r="13" fill="#fca5a5"/>
  <rect x="191" y="125" width="18" height="33" fill="#dc2626" rx="7"/>
  <!-- Lunch tray -->
  <rect x="174" y="140" width="50" height="5" fill="#d97706" rx="2"/>
  <rect x="180" y="128" width="16" height="12" fill="#fde68a" rx="2"/>

  <!-- Child with empty tray (forgot lunch) -->
  <!-- Empty tray -->
  <rect x="120" y="140" width="52" height="5" fill="#d97706" rx="2"/>
  <!-- Empty tray surface -->
  <rect x="122" y="122" width="48" height="18" fill="#f9fafb" rx="3" stroke="#e5e7eb" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="146" y="135" font-size="18" text-anchor="middle" fill="#e5e7eb">∅</text>

  <!-- Child looking at empty tray -->
  <circle cx="146" cy="100" r="20" fill="#fbbf24"/>
  <circle cx="139" cy="96"  r="3"  fill="#374151"/>
  <circle cx="153" cy="96"  r="3"  fill="#374151"/>
  <!-- Hungry sad expression -->
  <path d="M 140 110 Q 146 106 152 110" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Hunger rumble lines -->
  <text x="168" y="102" font-size="14" fill="#d97706" opacity="0.7">~</text>
  <text x="174" y="114" font-size="12" fill="#d97706" opacity="0.5">~</text>

  <!-- Body -->
  <rect x="134" y="120" width="24" height="24" fill="#0891b2" rx="10"/>

  <!-- Arms on empty tray area -->
  <line x1="134" y1="130" x2="116" y2="140" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
  <line x1="158" y1="128" x2="172" y2="140" stroke="#fbbf24" stroke-width="8" stroke-linecap="round"/>
</svg>
