  <!-- Key with question mark (lost key) -->
  <g transform="translate(210, 80) rotate(35)">
    <circle cx="0"  cy="0"  r="18" fill="none" stroke="#d97706" stroke-width="6"/>
    <circle cx="0"  cy="0"  r="11" fill="none" stroke="#d97706" stroke-width="3"/>
    <rect x="-3" cy="18" width="6" height="36" fill="#d97706" rx="2"/>
