  <!-- Empty pockets visualised -->
  <!-- Jacket with empty pockets -->
  <rect x="40" y="118" width="100" height="50" fill="#6d28d9" rx="8" opacity="0.3"/>
  <rect x="50"  y="128" width="28" height="24" fill="white" rx="4" stroke="#6d28d9" stroke-width="1.5" opacity="0.6"/>
  <rect x="102" y="128" width="28" height="24" fill="white" rx="4" stroke="#6d28d9" stroke-width="1.5" opacity="0.6"/>
  <text x="64"  y="144" font-size="14" text-anchor="middle" fill="#d1d5db">∅</text>
  <text x="116" y="144" font-size="14" text-anchor="middle" fill="#d1d5db">∅</text>

  <!-- Child searching pockets -->
  <circle cx="90" cy="96" r="21" fill="#fbbf24"/>
  <path d="M 82 91 Q 85 88 88 91" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 93 91 Q 96 88 99 91" stroke="#374151" stroke-width="2.5" fill="none" stroke-linecap="round"/>
  <path d="M 83 107 Q 90 103 97 107" stroke="#374151" stroke-width="2" fill="none" stroke-linecap="round"/>

