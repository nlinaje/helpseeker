text: |
  In speech mode the app shall record the child's voice and transcribe
  it offline using Whisper (whisper-tiny). A Sørensen-Dice word-overlap
  score >= 60% against the target phrase constitutes a successful
  attempt. The transcription and score shall be displayed to the child.
